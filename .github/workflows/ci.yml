name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Run Ruff
        run: python -m ruff check custom_components test_support tests tests_ha
      - name: Compile Python files
        run: python -m compileall -q custom_components test_support tests tests_ha

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build runtime-only HACS package
        run: ./scripts/build_hacs_release.sh

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements-dev.txt
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest -q

  test-homeassistant:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements-dev-ha.txt
      - name: Install Home Assistant test dependencies
        run: python -m pip install -r requirements-dev-ha.txt
      - name: Run real Home Assistant smoke tests
        run: pytest -q tests_ha
