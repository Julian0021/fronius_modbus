name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Run Ruff
        run: python -m ruff check custom_components tests
      - name: Compile Python files
        run: python -m compileall -q custom_components tests

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build runtime-only HACS package
        run: ./scripts/build_hacs_release.sh
      - name: Verify package contents
        run: |
          python - <<'PY'
          from __future__ import annotations

          from pathlib import Path
          import zipfile

          archives = sorted(Path("dist").glob("*.zip"))
          assert len(archives) == 1, archives

          with zipfile.ZipFile(archives[0]) as archive:
              names = archive.namelist()

          assert names, "package is empty"
          assert "custom_components/fronius_modbus/manifest.json" in names
          allowed_roots = {"custom_components/"}
          assert all(
              name in allowed_roots
              or name.startswith("custom_components/fronius_modbus/")
              for name in names
          ), names
          assert not any(name.startswith("tests/") for name in names), names
          assert not any(name.startswith(".github/") for name in names), names
          PY

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements-dev.txt
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest -q
